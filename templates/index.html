<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ app_name }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>

  <div id="permission-overlay" class="overlay" hidden>
    <div class="permission-card">
      <div class="permission-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3z" stroke="#2F6FED" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="#2F6FED" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Allow profile access</h2>
      <p>
        {{ app_name }} needs permission to read local browser profile data
        (name, account, and avatar) from Chrome, Edge, and Brave so it can
        show and launch your profiles. No data ever leaves your computer.
      </p>
      <div class="permission-actions">
        <button id="permission-deny" class="btn btn-ghost">Not now</button>
        <button id="permission-allow" class="btn btn-primary">Allow access</button>
      </div>
    </div>
  </div>

  <div id="app" class="app">
    <header class="app-header">
      <h1 class="app-title">{{ app_name }}</h1>
    </header>

    <div class="search-wrap">
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search profiles..." autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <div class="filters" id="filters"></div>

    <main class="grid-wrap">
      <div id="empty-state" class="empty-state" hidden>
        <p id="empty-state-message">No profiles found.</p>
        <button id="empty-state-action" class="btn btn-primary" hidden>Allow access</button>
      </div>
      <div id="profile-grid" class="profile-grid" role="listbox" aria-label="Browser profiles"></div>
    </main>
  </div>

  <button id="refresh-btn" class="refresh-btn" title="Refresh profiles" aria-label="Refresh profiles">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M20 12a8 8 0 1 1-2.34-5.66" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M20 4v6h-6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <template id="profile-card-template">
    <div class="profile-card" tabindex="0" role="option">
      <div class="profile-avatar">
        <img class="profile-avatar-img" alt="" />
        <span class="profile-avatar-fallback"></span>
      </div>
      <div class="profile-name"></div>
      <div class="profile-account"></div>
      <div class="profile-browser-badge">
        <img class="profile-browser-logo" alt="" />
      </div>
    </div>
  </template>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
